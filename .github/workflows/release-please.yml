name: Release Please

on:
  push:
    branches:
      - main

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write  # Required for label management

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
    - name: Validate Release Please token
      run: |
        if [ -z "$RELEASE_PLEASE_TOKEN" ]; then
          echo "::error::Set RELEASE_PLEASE_TOKEN to a fine-grained PAT or GitHub App token. Release Please PRs created with GITHUB_TOKEN do not trigger pull_request workflows, leaving required checks such as merge-decision pending."
          exit 1
        fi
      env:
        RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}

    - name: Release Please
      uses: googleapis/release-please-action@7987652d64b4581673a76e33ad5e98e3dd56832f # v4.1.3
      id: release
      with:
        config-file: .release-please-config.json
        manifest-file: .release-please-manifest.json
        # PRs created with GITHUB_TOKEN do not trigger downstream pull_request workflows.
        token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        
    # Output release information for debugging
    - name: Output release information
      if: ${{ steps.release.outputs.release_created }}
      run: |
        echo "Release created!"
        echo "Tag: ${{ steps.release.outputs.tag_name }}"
        echo "Version: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}"
        echo "Upload URL: ${{ steps.release.outputs.upload_url }}"
        echo ""
        echo "The release tag has been created. The release.yml workflow will handle publishing to npm."
