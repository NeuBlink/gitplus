name: Release

on:
  push:
    tags:
      - 'v*'
      - 'gitplus-v*'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run full validation
      run: npm run validate
      
    - name: Build project
      run: npm run build

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build project
      run: npm run build
      
    - name: Publish to NPM
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  test-published-package:
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Wait for NPM propagation
      run: sleep 60
      
    - name: Test NPM installation
      run: |
        # Extract version from tag
        TAG_NAME=${GITHUB_REF#refs/tags/}
        VERSION=${TAG_NAME#gitplus-v}
        VERSION=${VERSION#v}
        
        # Test global CLI installation
        npm install -g "@neublink/gitplus@$VERSION"
        
        # Test CLI commands
        gitplus --version
        gitplus --help
        
        # Test in a git repository
        mkdir test-repo && cd test-repo
        git init
        git config user.name "Test User"
        git config user.email "test@example.com"
        
        echo "# Test" > README.md
        git add README.md
        
        # Test gitplus commands (without AI since Claude CLI won't be available)
        gitplus status || echo "Status command tested"
        gitplus validate || echo "Validate command tested"
        
        echo "✅ Package installation and basic functionality verified"
